name: scipy.root_finding
version: 1
description: Find a root of a scalar function in a bracketing interval.
category: optimization
inputs:
  function:
    schema: String
    required: true
    description: "Name of the function from the built-in registry: 'quadratic_shift', 'cubic', 'linear_system'."
  bracket:
    schema: JsonArray
    required: true
    description: "Bracketing interval [a, b] where the function changes sign."
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  root:
    schema: Float
    description: The root found.
  converged:
    schema: Boolean
    description: Whether the root-finding converged successfully.
implementation:
  language: python
  entry_point: tool.py:run
