name: stats.adf_test
version: 1
description: Augmented Dickey-Fuller test for stationarity of a time series.
category: hypothesis_testing
inputs:
  series:
    schema: Series
    required: true
    description: Time series to test for stationarity.
  regression:
    schema: String
    required: false
    default: "c"
    description: "Deterministic term: 'c' (constant), 'ct' (constant+trend), 'ctt', or 'n' (none)."
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  statistic:
    schema: Float
    description: ADF test statistic.
  p_value:
    schema: Float
    description: MacKinnon approximate p-value.
  critical_values:
    schema: JsonObject
    description: Critical values at 1%, 5%, and 10% significance levels.
implementation:
  language: python
  entry_point: tool.py:run
