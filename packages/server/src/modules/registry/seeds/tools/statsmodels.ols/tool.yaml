name: statsmodels.ols
version: 1
description: Ordinary least squares regression with full statistical diagnostics.
category: regression
inputs:
  x:
    schema: NumpyArray
    required: true
    description: Feature matrix of shape (n_samples, n_features).
  y:
    schema: NumpyArray
    required: true
    description: Target vector of shape (n_samples,).
  add_constant:
    schema: Boolean
    required: false
    default: true
    description: Whether to add a constant (intercept) column to x.
outputs:
  coefficients:
    schema: NumpyArray
    description: Fitted regression coefficients (including intercept as first element when add_constant is true).
  p_values:
    schema: NumpyArray
    description: P-values for each coefficient.
  r_squared:
    schema: Float
    description: R-squared of the fitted model.
  summary:
    schema: String
    description: Full text summary report of the fitted model.
implementation:
  language: python
  entry_point: tool.py:run
