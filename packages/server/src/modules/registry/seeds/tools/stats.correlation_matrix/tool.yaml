name: stats.correlation_matrix
version: 1
description: Compute the pairwise correlation matrix of a DataFrame's columns.
category: descriptive_stats
inputs:
  df:
    schema: DataFrame
    required: true
    description: Input DataFrame (numeric columns only are used).
  method:
    schema: String
    required: false
    default: "pearson"
    description: "Correlation method: 'pearson', 'spearman', or 'kendall'."
outputs:
  corr:
    schema: DataFrame
    description: Correlation matrix as a square DataFrame indexed by column names.
implementation:
  language: python
  entry_point: tool.py:run
