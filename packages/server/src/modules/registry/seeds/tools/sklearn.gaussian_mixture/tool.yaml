name: sklearn.gaussian_mixture
version: 1
description: Gaussian Mixture Model clustering.
category: clustering
inputs:
  matrix:
    schema: NumpyArray
    required: true
    description: Input data matrix (n_samples x n_features).
  n_components:
    schema: Integer
    required: true
    description: Number of mixture components.
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  labels:
    schema: NumpyArray
    description: Component labels for each sample (n_samples,).
  probabilities:
    schema: NumpyArray
    description: Soft assignment probabilities for each sample (n_samples x n_components).
  aic:
    schema: Float
    description: Akaike Information Criterion value.
  bic:
    schema: Float
    description: Bayesian Information Criterion value.
  model:
    schema: ClusteringModel
    description: Trained GaussianMixture model object.
implementation:
  language: python
  entry_point: tool.py:run
