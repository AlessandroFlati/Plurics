name: sklearn.pca
version: 1
description: Principal Component Analysis on a numeric matrix.
category: decomposition
inputs:
  matrix:
    schema: NumpyArray
    required: true
    description: Input data matrix (n_samples x n_features).
  n_components:
    schema: Integer
    required: false
    default: null
    description: Number of principal components to keep. When null, keeps min(n_samples, n_features) components.
  whiten:
    schema: Boolean
    required: false
    default: false
    description: Whether to whiten the components.
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  components:
    schema: NumpyArray
    description: Principal axes (n_components x n_features).
  loadings:
    schema: NumpyArray
    description: Projection of input onto principal axes (n_samples x n_components).
  explained_variance_ratio:
    schema: JsonArray
    description: Fraction of variance explained by each component.
implementation:
  language: python
  entry_point: tool.py:run
