name: statsmodels.glm
version: 1
description: Generalized linear model with configurable link function and family.
category: regression
inputs:
  x:
    schema: NumpyArray
    required: true
    description: Feature matrix of shape (n_samples, n_features). A constant is added automatically.
  y:
    schema: NumpyArray
    required: true
    description: Target vector of shape (n_samples,).
  family:
    schema: String
    required: false
    default: "gaussian"
    description: "GLM family: 'gaussian', 'binomial', 'poisson', 'gamma', 'inverse_gaussian', 'negative_binomial', 'tweedie'."
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  coefficients:
    schema: NumpyArray
    description: Fitted model parameters (including intercept).
  p_values:
    schema: NumpyArray
    description: P-values for each coefficient.
  model:
    schema: RegressionModel
    description: Trained GLM result object.
implementation:
  language: python
  entry_point: tool.py:run
