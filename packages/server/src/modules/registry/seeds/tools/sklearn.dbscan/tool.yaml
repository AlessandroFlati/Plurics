name: sklearn.dbscan
version: 1
description: DBSCAN density-based clustering.
category: clustering
inputs:
  matrix:
    schema: NumpyArray
    required: true
    description: Input data matrix (n_samples x n_features).
  eps:
    schema: Float
    required: false
    default: 0.5
    description: Maximum distance between two samples to be considered neighbors.
  min_samples:
    schema: Integer
    required: false
    default: 5
    description: Minimum number of samples in a neighborhood for a core point.
outputs:
  labels:
    schema: NumpyArray
    description: Cluster labels; -1 indicates noise points.
  n_clusters:
    schema: Integer
    description: Number of clusters found (excluding noise).
  n_noise:
    schema: Integer
    description: Number of noise points (labeled -1).
implementation:
  language: python
  entry_point: tool.py:run
