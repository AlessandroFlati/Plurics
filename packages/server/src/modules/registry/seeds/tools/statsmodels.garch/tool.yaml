name: statsmodels.garch
version: 1
description: Fit a GARCH model to a return series.
category: time_series
inputs:
  returns:
    schema: ReturnSeries
    required: true
    description: Return series (e.g. log-returns).
  p:
    schema: Integer
    required: false
    default: 1
    description: GARCH lag order p.
  q:
    schema: Integer
    required: false
    default: 1
    description: ARCH lag order q.
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  aic:
    schema: Float
    description: Akaike Information Criterion of the fitted model.
  bic:
    schema: Float
    description: Bayesian Information Criterion of the fitted model.
  conditional_volatility:
    schema: Series
    description: Estimated conditional volatility series.
  model:
    schema: RegressionModel
    description: Fitted GARCH model result object.
implementation:
  language: python
  entry_point: tool.py:run
