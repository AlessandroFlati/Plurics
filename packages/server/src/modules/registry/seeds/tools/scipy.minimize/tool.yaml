name: scipy.minimize
version: 1
description: Minimize a scalar function of one or more variables.
category: optimization
inputs:
  function:
    schema: String
    required: true
    description: "Name of the objective function from the built-in registry: 'rosenbrock', 'quadratic', 'sphere'."
  initial_guess:
    schema: NumpyArray
    required: true
    description: Initial guess for the minimizer (1-D array).
  method:
    schema: String
    required: false
    default: "BFGS"
    description: Optimization method (e.g. 'BFGS', 'Nelder-Mead', 'L-BFGS-B').
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  x:
    schema: NumpyArray
    description: Solution array at the minimum.
  fun:
    schema: Float
    description: Value of objective function at the minimum.
  success:
    schema: Boolean
    description: Whether the optimizer converged successfully.
  n_iter:
    schema: Integer
    description: Number of iterations performed.
implementation:
  language: python
  entry_point: tool.py:run
