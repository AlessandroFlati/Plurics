name: statsmodels.arima
version: 1
description: Fit an ARIMA model to a time series.
category: time_series
inputs:
  series:
    schema: Series
    required: true
    description: Time series values.
  order:
    schema: JsonArray
    required: true
    description: "ARIMA order as [p, d, q] for autoregressive, differencing, and moving average orders."
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  aic:
    schema: Float
    description: Akaike Information Criterion of the fitted model.
  bic:
    schema: Float
    description: Bayesian Information Criterion of the fitted model.
  residuals:
    schema: Series
    description: Model residuals.
  fitted:
    schema: Series
    description: Fitted values from the model.
  model:
    schema: RegressionModel
    description: Fitted ARIMA model result object.
implementation:
  language: python
  entry_point: tool.py:run
