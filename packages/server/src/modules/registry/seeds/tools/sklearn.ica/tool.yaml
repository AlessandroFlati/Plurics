name: sklearn.ica
version: 1
description: Independent Component Analysis on a numeric matrix.
category: decomposition
inputs:
  matrix:
    schema: NumpyArray
    required: true
    description: Input data matrix (n_samples x n_features).
  n_components:
    schema: Integer
    required: false
    default: null
    description: Number of independent components to extract. When null, uses min(n_samples, n_features).
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  components:
    schema: NumpyArray
    description: Unmixing matrix rows (n_components x n_features).
  sources:
    schema: NumpyArray
    description: Independent component activations (n_samples x n_components).
implementation:
  language: python
  entry_point: tool.py:run
