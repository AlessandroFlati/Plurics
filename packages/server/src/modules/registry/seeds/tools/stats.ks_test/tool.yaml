name: stats.ks_test
version: 1
description: Kolmogorov-Smirnov test against a reference distribution.
category: hypothesis_testing
inputs:
  values:
    schema: NumpyArray
    required: true
    description: Sample to test (1-D array of numbers).
  distribution:
    schema: String
    required: true
    description: "Name of a scipy.stats distribution to test against (e.g. 'norm', 'uniform', 'expon')."
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to scipy.stats.kstest (e.g. distribution parameters).
outputs:
  statistic:
    schema: Float
    description: KS statistic.
  p_value:
    schema: Float
    description: Two-sided p-value.
implementation:
  language: python
  entry_point: tool.py:run
