name: ts.granger_causality
version: 1
description: Granger causality test between two time series.
category: time_series
inputs:
  cause:
    schema: Series
    required: true
    description: The series hypothesized as the Granger cause.
  effect:
    schema: Series
    required: true
    description: The series hypothesized as the Granger effect.
  max_lag:
    schema: Integer
    required: false
    default: 10
    description: Maximum number of lags to test.
outputs:
  p_values:
    schema: JsonArray
    description: p-value for each lag from 1 to max_lag (F-test).
  best_lag:
    schema: Integer
    description: Lag with the lowest p-value.
implementation:
  language: python
  entry_point: tool.py:run
