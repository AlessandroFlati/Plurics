name: sklearn.ridge_regression
version: 1
description: L2-regularized linear regression.
category: regression
inputs:
  x:
    schema: NumpyArray
    required: true
    description: Feature matrix of shape (n_samples, n_features).
  y:
    schema: NumpyArray
    required: true
    description: Target vector of shape (n_samples,).
  alpha:
    schema: Float
    required: false
    default: 1.0
    description: L2 regularization strength (must be positive).
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  coefficients:
    schema: NumpyArray
    description: Fitted regression coefficients.
  intercept:
    schema: Float
    description: Fitted intercept term.
  r_squared:
    schema: Float
    description: Coefficient of determination (R^2) on the training data.
  model:
    schema: RegressionModel
    description: Trained regression model object.
implementation:
  language: python
  entry_point: tool.py:run
