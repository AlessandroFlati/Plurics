name: stats.permutation_test
version: 1
description: General permutation test for an arbitrary statistic between two samples.
category: hypothesis_testing
inputs:
  sample_a:
    schema: NumpyArray
    required: true
    description: First sample (1-D array of numbers).
  sample_b:
    schema: NumpyArray
    required: true
    description: Second sample (1-D array of numbers).
  statistic:
    schema: String
    required: true
    description: "Name of the built-in statistic to use: 'mean_diff', 'median_diff'."
  n_resamples:
    schema: Integer
    required: false
    default: 9999
    description: Number of permutation resamples.
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  statistic:
    schema: Float
    description: Observed test statistic.
  p_value:
    schema: Float
    description: Permutation p-value.
implementation:
  language: python
  entry_point: tool.py:run
