name: stats.t_test
version: 1
description: Two-sample t-test for the means of two independent samples.
category: hypothesis_testing
inputs:
  sample_a:
    schema: NumpyArray
    required: true
    description: First sample (1-D array of numbers).
  sample_b:
    schema: NumpyArray
    required: true
    description: Second sample (1-D array of numbers).
  equal_var:
    schema: Boolean
    required: false
    default: true
    description: If false, perform Welch's t-test (unequal variances).
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  statistic:
    schema: Float
    description: t-statistic.
  p_value:
    schema: Float
    description: Two-tailed p-value.
implementation:
  language: python
  entry_point: tool.py:run
