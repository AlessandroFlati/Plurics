name: pandas.groupby_agg
version: 1
description: Group a DataFrame by one or more columns and aggregate.
category: data_transformation
inputs:
  df:
    schema: DataFrame
    required: true
    description: Input DataFrame to group.
  by:
    schema: JsonArray
    required: true
    description: List of column names to group by.
  agg:
    schema: JsonObject
    required: true
    description: Aggregation spec mapping column names to aggregation function names.
outputs:
  aggregated:
    schema: DataFrame
    description: Aggregated DataFrame.
implementation:
  language: python
  entry_point: tool.py:run
