name: scipy.curve_fit
version: 1
description: Fit a parameterized function to data.
category: optimization
inputs:
  function:
    schema: String
    required: true
    description: "Name of the model function from the built-in registry: 'linear', 'quadratic', 'exponential'."
  x:
    schema: NumpyArray
    required: true
    description: Independent variable data (1-D array).
  y:
    schema: NumpyArray
    required: true
    description: Dependent variable data (1-D array), same length as x.
  initial_guess:
    schema: NumpyArray
    required: false
    default: null
    description: Initial parameter guess for the model function.
outputs:
  parameters:
    schema: NumpyArray
    description: Optimal values for the parameters.
  covariance:
    schema: NumpyArray
    description: Estimated covariance matrix of the parameters.
implementation:
  language: python
  entry_point: tool.py:run
