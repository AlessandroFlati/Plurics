name: pandas.load_parquet
version: 1
description: Load a Parquet file into a DataFrame.
category: data_io
inputs:
  path:
    schema: String
    required: true
    description: Absolute or relative path to the Parquet file.
  columns:
    schema: JsonArray
    required: false
    default: null
    description: List of column names to load (loads all if null).
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  df:
    schema: DataFrame
    description: The loaded pandas DataFrame.
implementation:
  language: python
  entry_point: tool.py:run
