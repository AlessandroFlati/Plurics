name: pandas.resample
version: 1
description: Resample a time-indexed DataFrame to a new frequency.
category: data_transformation
inputs:
  df:
    schema: DataFrame
    required: true
    description: Input time-series DataFrame (index must be a DatetimeIndex).
  frequency:
    schema: String
    required: true
    description: Resampling frequency (pandas offset alias, e.g. "5min", "1H", "1D").
  agg:
    schema: String
    required: false
    default: "mean"
    description: Aggregation function name (e.g. "mean", "sum", "first", "last", "ohlc").
outputs:
  resampled:
    schema: DataFrame
    description: Resampled DataFrame.
implementation:
  language: python
  entry_point: tool.py:run
