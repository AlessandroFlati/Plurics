name: stats.mann_whitney
version: 1
description: Mann-Whitney U test, a non-parametric alternative to the t-test.
category: hypothesis_testing
inputs:
  sample_a:
    schema: NumpyArray
    required: true
    description: First sample (1-D array of numbers).
  sample_b:
    schema: NumpyArray
    required: true
    description: Second sample (1-D array of numbers).
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  statistic:
    schema: Float
    description: U statistic.
  p_value:
    schema: Float
    description: Two-sided p-value.
implementation:
  language: python
  entry_point: tool.py:run
