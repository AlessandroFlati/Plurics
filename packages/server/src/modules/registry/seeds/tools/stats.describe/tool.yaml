name: stats.describe
version: 1
description: Compute summary statistics (count, mean, std, min, quartiles, max) for numeric columns.
category: descriptive_stats
inputs:
  df:
    schema: DataFrame
    required: true
    description: Input DataFrame to summarise.
  percentiles:
    schema: JsonArray
    required: false
    default: [0.25, 0.5, 0.75]
    description: List of percentiles to include in the summary.
outputs:
  stats:
    schema: DataFrame
    description: Summary statistics as a DataFrame (stats as index, columns as columns).
implementation:
  language: python
  entry_point: tool.py:run
