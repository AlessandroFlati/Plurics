name: stats.histogram
version: 1
description: Compute a histogram of a numeric array.
category: descriptive_stats
inputs:
  values:
    schema: NumpyArray
    required: true
    description: Numeric array of values.
  bins:
    schema: Integer
    required: false
    default: 10
    description: Number of histogram bins.
  range:
    schema: JsonArray
    required: false
    default: null
    description: "Optional [min, max] range for the histogram bins."
outputs:
  counts:
    schema: NumpyArray
    description: Count of values in each bin.
  bin_edges:
    schema: NumpyArray
    description: Bin edge values (length = bins + 1).
implementation:
  language: python
  entry_point: tool.py:run
