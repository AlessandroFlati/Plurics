name: statsmodels.decompose
version: 1
description: Decompose a time series into trend, seasonal, and residual components.
category: time_series
inputs:
  series:
    schema: Series
    required: true
    description: Time series values.
  period:
    schema: Integer
    required: true
    description: Number of observations per seasonal cycle (e.g. 12 for monthly data).
  model:
    schema: String
    required: false
    default: "additive"
    description: "Decomposition model: 'additive' or 'multiplicative'."
outputs:
  trend:
    schema: Series
    description: Trend component of the decomposition.
  seasonal:
    schema: Series
    description: Seasonal component of the decomposition.
  residual:
    schema: Series
    description: Residual component of the decomposition.
implementation:
  language: python
  entry_point: tool.py:run
