name: sklearn.nmf
version: 1
description: Non-negative Matrix Factorization.
category: decomposition
inputs:
  matrix:
    schema: NumpyArray
    required: true
    description: Non-negative input matrix (n_samples x n_features).
  n_components:
    schema: Integer
    required: true
    description: Number of components (rank of factorization).
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  W:
    schema: NumpyArray
    description: Activation matrix (n_samples x n_components).
  H:
    schema: NumpyArray
    description: Component matrix (n_components x n_features).
implementation:
  language: python
  entry_point: tool.py:run
