name: stats.autocorrelation
version: 1
description: Compute the autocorrelation function of a time series up to a given lag.
category: descriptive_stats
inputs:
  series:
    schema: Series
    required: true
    description: Time series values.
  nlags:
    schema: Integer
    required: false
    default: 40
    description: Maximum lag to compute (inclusive). Defaults to 40.
  extra_params:
    schema: JsonObject
    required: false
    default: {}
    description: Additional keyword arguments passed to the underlying library function.
outputs:
  acf:
    schema: NumpyArray
    description: Autocorrelation values at lags 0..nlags.
  confint:
    schema: NumpyArray
    description: Confidence intervals for each lag (returned when alpha is provided in extra_params).
implementation:
  language: python
  entry_point: tool.py:run
