name: stats.mean
version: 1
description: Compute the arithmetic mean of a numeric array or series.
category: descriptive_stats
inputs:
  values:
    schema: NumpyArray
    required: true
    description: Numeric array of values.
  axis:
    schema: Integer
    required: false
    default: null
    description: Axis along which to compute the mean. When null, returns the global mean.
outputs:
  mean:
    schema: Float
    description: Arithmetic mean of the input values.
implementation:
  language: python
  entry_point: tool.py:run
