name: math-discovery
version: 1
plugin: ./plugin.ts

config:
  # Timing
  agent_timeout_seconds: 600
  prover_timeout_seconds: 120     # Shorter: retry quickly if no proof in 2 min
  lean_check_timeout_seconds: 180 # Incremental lake build

  # Concurrency
  max_parallel_conjectures: 3
  max_concurrent_agents: 10

  # Evolutionary loop
  max_rounds: 5                    # Discovery rounds
  conjectures_per_round: 5         # Conjecturer output per round
  top_k_for_context: 3             # Positive examples injected into Conjecturer round 2+
  negative_examples: 2             # Falsified conjectures as negative context
  selection_strategy: tournament
  tournament_size: 3

  # Prover self-correction loop (managed by plugin as a compound node)
  prover_max_self_corrections: 3
  prover_endpoint: http://localhost:8000/v1
  prover_model: Goedel-LM/Goedel-Prover-V2-8B

  # Data sources
  ohlc_symbols: ["EURUSD", "GBPUSD", "USDJPY", "XAUUSD", "SPX500"]
  ohlc_timeframes: ["M1", "M5", "M15", "M30", "H1"]
  ohlc_months: 7

  # Phase C gate — Operational Validation only runs when there are enough
  # formally verified findings
  min_confirmed_findings_for_backtest: 3

  # Lean project
  lean_project_dir: "{{WORKSPACE}}/.plurics/shared/lean-project"

shared_context: |
  You are part of an autonomous mathematical discovery pipeline analyzing
  financial time series (OHLC data) to find and formally prove structural
  properties.

  WORKSPACE:
    .plurics/shared/data/tables/            - OHLC Parquet files per symbol/timeframe
    .plurics/shared/data/profile.json       - Statistical data profile
    .plurics/shared/data/conjectures/       - Conjecture JSON files (C-NNN.json)
    .plurics/shared/lean-project/           - Incremental Lean 4 project with proofs
    .plurics/shared/findings/               - Human-readable finding reports
    .plurics/shared/signals/                - Completion signals
    .plurics/shared/pool-state.json         - Evolutionary pool snapshot

  RULES:
  1. Your inputs are PRE-LOADED in your purpose below. Do NOT cat/read files already shown inline.
  2. Write outputs to .plurics/shared/ following the exact paths in your instructions.
  3. Follow the Signal Protocol EXACTLY.
  4. All JSON output must be valid. Validate before writing.
  5. On unrecoverable error, still write a signal with status "failure".

  SIGNAL PROTOCOL:
  1. Write output files: cat > .plurics/{path}.tmp << 'EOF' ... EOF && mv .plurics/{path}.tmp .plurics/{path}
  2. Verify JSON: python3 -c "import json; json.load(open('.plurics/{path}'))"
  3. Compute integrity: sha256sum .plurics/{path} | cut -d' ' -f1 ; wc -c < .plurics/{path}
  4. Write signal file (ALWAYS LAST) using your per-agent template, via .tmp + mv.
  Rules: signal AFTER all outputs; always .tmp+mv; sha256 AFTER mv; use size_bytes; paths relative to .plurics/.

# ===========================================================================
# PHASE A — Empirical Discovery
# ===========================================================================

nodes:

  ohlc_fetch:
    preset: research/math-discovery/ohlc-fetcher
    backend: process
    command: ["py", "-m", "ohlc_fetcher"]
    working_dir: "{{WORKSPACE}}"
    depends_on: []
    timeout_seconds: 900

  profiler:
    preset: research/math-discovery/profiler
    backend: claude-code
    model: sonnet
    depends_on: [ohlc_fetch]

  conjecturer:
    preset: research/math-discovery/conjecturer
    backend: claude-code
    model: opus
    depends_on: [profiler]
    max_invocations: 5  # max_rounds

  critic:
    preset: research/math-discovery/critic
    backend: claude-code
    model: opus
    depends_on: [conjecturer]

  selector:
    preset: research/math-discovery/selector
    backend: claude-code
    model: opus
    depends_on: [critic]
    branch:
      - condition: "selected"
        goto: formalizer
        foreach: selected_conjectures

# ===========================================================================
# PHASE B — Formal Verification (per-conjecture fan-out)
# ===========================================================================

  formalizer:
    preset: research/math-discovery/formalizer
    backend: claude-code
    model: opus
    depends_on: [selector]

  strategist:
    preset: research/math-discovery/strategist
    backend: claude-code
    model: opus
    depends_on: [formalizer]

  prover:
    # Compound node: the plugin manages the prover <-> lean_check self-correction
    # loop internally (up to prover_max_self_corrections rounds). From the DAG's
    # perspective, this is a single node that either succeeds, fails, or times out.
    preset: research/math-discovery/prover
    backend: local-llm
    endpoint: http://localhost:8000/v1
    model: Goedel-LM/Goedel-Prover-V2-8B
    max_tokens: 32768
    depends_on: [strategist]
    timeout_seconds: 600  # Includes all retry rounds
    branch:
      - condition: "proof_valid"
        goto: abstractor
      - condition: "proof_invalid"
        goto: counterexample
      - condition: "max_retries"
        goto: counterexample

  counterexample:
    preset: research/math-discovery/counterexample
    backend: claude-code
    model: sonnet
    depends_on: [prover]
    branch:
      - condition: "counterexample_found"
        goto: conjecturer   # Falsified -> feed back into next round
      - condition: "no_counterexample"
        goto: abstractor    # Inconclusive -> still abstract

  abstractor:
    preset: research/math-discovery/abstractor
    backend: claude-code
    model: opus
    depends_on: [prover, counterexample]  # OR-dependency (handled by plugin)

  synthesizer:
    preset: research/math-discovery/synthesizer
    backend: claude-code
    model: opus
    depends_on_all: [abstractor]   # Wait for all scoped abstractors
    branch:
      - condition: "findings_sufficient"
        goto: backtest_designer
      - condition: "continue_exploration"
        goto: conjecturer

# ===========================================================================
# PHASE C — Operational Validation (gated by synthesizer)
# ===========================================================================

  backtest_designer:
    preset: research/math-discovery/backtest-designer
    backend: claude-code
    model: opus
    depends_on: [synthesizer]

  backtester:
    preset: research/math-discovery/backtester
    backend: process
    command: ["py", "-m", "backtester"]
    working_dir: "{{WORKSPACE}}"
    depends_on: [backtest_designer]
    timeout_seconds: 1800
