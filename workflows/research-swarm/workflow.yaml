name: research-swarm
version: 1
plugin: ./plugin.ts

config:
  max_hypothesis_rounds: 3
  max_audit_rounds: 5
  max_total_tests: 50
  agent_timeout_seconds: 300
  base_significance: 0.05
  max_parallel_hypotheses: 3
  hypotheses_per_batch: 8
  min_hypotheses_to_proceed: 2
  script_timeout_seconds: 120

shared_context: |
  You are part of an autonomous research swarm analyzing a dataset.

  WORKSPACE:
    .plurics/shared/data/          - All data artifacts (dataset, hypotheses, results, etc.)
    .plurics/shared/findings/      - Human-readable finding reports
    .plurics/shared/signals/       - Completion signals

  RULES:
  1. Your inputs are PRE-LOADED in your purpose below. Do NOT cat/read files that are already shown inline.
  2. Write outputs to .plurics/shared/ following the exact paths in your instructions.
  3. Follow the Signal Protocol EXACTLY.
  4. All JSON output must be valid. Validate before writing.
  5. Do not modify files outside your designated output paths.
  6. On unrecoverable error, still write a signal with status "failure".

  SIGNAL PROTOCOL:
  1. Write output files: cat > .plurics/{path}.tmp << 'EOF' ... EOF && mv .plurics/{path}.tmp .plurics/{path}
  2. Verify JSON: python3 -c "import json; json.load(open('.plurics/{path}'))"
  3. Compute integrity: sha256sum .plurics/{path} | cut -d' ' -f1 ; wc -c < .plurics/{path}
  4. Write signal file (ALWAYS LAST) using your per-agent template, via .tmp + mv.
  Rules: signal AFTER all outputs; always .tmp+mv; sha256 AFTER mv; use size_bytes not size; paths relative to .plurics/.

nodes:

  ingestor:
    preset: research/ingestor
    depends_on: []
    timeout_seconds: 600
    model: sonnet
    effort: low

  profiler:
    preset: research/profiler
    depends_on: [ingestor]
    timeout_seconds: 600
    model: sonnet
    effort: low

  hypothesist:
    preset: research/hypothesist
    depends_on: [profiler]
    max_invocations: 3
    timeout_seconds: 600
    model: opus
    effort: low

  adversary:
    preset: research/adversary
    depends_on: [hypothesist]
    timeout_seconds: 600
    model: opus
    effort: low

  judge:
    preset: research/judge
    depends_on: [adversary]
    timeout_seconds: 600
    model: opus
    effort: low
    branch:
      - condition: "approved >= min"
        goto: architect
        foreach: approved_hypotheses
      - condition: "rounds_remaining > 0"
        goto: hypothesist

  architect:
    preset: research/architect
    depends_on: [judge]
    timeout_seconds: 600
    model: opus
    effort: low

  coder:
    preset: research/coder
    depends_on: [architect]
    timeout_seconds: 600
    model: sonnet
    effort: low

  auditor:
    preset: research/auditor
    depends_on: [coder]
    max_invocations: 5
    model: opus
    effort: low
    branch:
      - condition: "clean"
        goto: executor
      - condition: "has_bugs"
        goto: fixer

  fixer:
    preset: research/fixer
    depends_on: [auditor]
    next: auditor
    timeout_seconds: 600
    model: sonnet
    effort: low

  executor:
    preset: research/executor
    depends_on: [auditor]
    timeout_seconds: 600
    model: sonnet
    effort: low

  falsifier:
    preset: research/falsifier
    depends_on: [executor]
    timeout_seconds: 600
    model: opus
    effort: low
    branch:
      - condition: "survived"
        goto: generalizer
      - condition: "falsified"
        goto: hypothesist

  generalizer:
    preset: research/generalizer
    depends_on: [falsifier]
    timeout_seconds: 600
    model: opus
    effort: low

  reporter:
    preset: research/reporter
    depends_on: [generalizer]
    timeout_seconds: 300
    model: sonnet
    effort: low

  meta_analyst:
    preset: research/meta-analyst
    depends_on_all: [reporter]
    timeout_seconds: 600
